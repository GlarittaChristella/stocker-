<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stocker - Login</title>

  <!-- Favicon -->
  <link href="{{ url_for('static', filename='img/logo stocker.png') }}" rel="icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.css') }}" rel="stylesheet">

  <!-- Main CSS -->
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow p-4">
        <h3 class="text-center mb-4">Login to Stocker</h3>

        <form method="POST" action="{{ url_for('login') }}">

          <div class="mb-3">
            <label class="form-label">Select Role</label>
            <select class="form-select" name="role" required>
              <option value="" disabled selected>Select your role</option>
              <option value="trader">Trader</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-success w-100">
            Login
          </button>

        </form>

        <p class="text-center mt-3">
          Don’t have an account?
          <a href="{{ url_for('signup') }}">Sign up here</a>
        </p>

      </div>

    </div>
  </div>
</div>

</body>
</html>
